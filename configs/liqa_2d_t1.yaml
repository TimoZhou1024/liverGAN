name: liqa_2d_t1
save_root: outputs/liqa_2d_t1
mode: 2d_slice

# ============================================================================
# 2D slice training — T1-only variant.
#
# Zero code change vs. configs/liqa_2d.yaml: the dataset, trainer, and
# inference script all derive input_nc from input_modalities automatically.
# The multi-discriminator collapses to a single D (per-channel multi-D with
# N=1), UNet2D shape loss is trained on GED4 (target, not input) so the same
# chk/UNet2D.pth is reused, and the Reg-shortcut fix is inherited unchanged.
#
# This is the ablation baseline for "how much do T2 and DWI_800 help?"
# ============================================================================

# Data — T1-only 2D slices, liver-mask-filtered.
input_modalities: [T1]
target_modality: GED4
dataset_root: D:\BaiduNetdiskDownload
mask_root: D:\BaiduNetdiskDownload\GED4_masks_pred
mask_suffix: GED4_pred.nii.gz
input_nc: 1
output_nc: 1
slice_size: 256                 # must be divisible by 32 (5 stride-2 halvings)
normalize_to_tanh: true
resample_to_target: true
percentile_lower: 1.0
percentile_upper: 99.0

train_txt_path: data/train.txt
val_txt_path: data/val.txt
test_txt_path: data/test.txt

# Model
g_base_channels: 64             # MrGAN 2D paper default
g_layers: 2
g_share_layers: 3
d_base_channels: 64
d_layers: 3
regist: true
shape_loss: true
unet_chk: chk/UNet2D.pth        # shared with configs/liqa_2d.yaml
unet_depth: 1
unet_base_channels: 32
num_classes: 2
palette: [[0], [1]]

# Loss weights (mirror reference/MrGAN/Yaml/mrgan.yaml + Reg-shortcut fix)
adv_lambda: 1.0
direct_lambda: 5.0
p2p_lambda: 2.0
mag_lambda: 2.0
reg_warmup_epochs: 10
blur_lambda: 5.0
perceptual_lambda: 0.5
corr_lambda: 1.0
smooth_lambda: 1.0
shape_lambda: 1.0

# Training
cuda: true
epoch: 0
n_epochs: 80
batch_size: 24                  # T1-only: fewer input channels → bump batch
n_cpu: 4
lr: 0.0001
decay_epoch: 20
log_interval: 50
checkpoint_interval: 5

amp: false
