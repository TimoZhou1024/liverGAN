name: liqa_mrgan3d_patch
save_root: outputs/liqa_3d_patch
mode: 3d_patch

# Data
input_modalities: [T1, T2, DWI_800]
target_modality: GED4
input_nc: 3
output_nc: 1
patch_size: [16, 128, 128]   # [D, H, W]
patch_stride: [8, 64, 64]    # [D, H, W]
target_size: null
normalize_to_tanh: true
resample_to_target: true
percentile_lower: 1.0
percentile_upper: 99.0
max_patches_per_volume: null

train_txt_path: data/train.txt
val_txt_path: data/val.txt
test_txt_path: data/test.txt

# Model
g_base_channels: 16
d_base_channels: 16
d_layers: 3
condition_channels_for_d: 3

# Training
cuda: true
epoch: 0
n_epochs: 80
batch_size: 1
n_cpu: 0
lr: 0.0001
adv_lambda: 1.0
l1_lambda: 10.0
blur_lambda: 2.0
log_interval: 10
checkpoint_interval: 5
