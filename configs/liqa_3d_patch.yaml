name: liqa_mrgan3d
save_root: outputs/liqa_mrgan3d
mode: 3d_patch

# Data
input_modalities: [T1, T2, DWI_800]
target_modality: GED4
dataset_root: D:\BaiduNetdiskDownload
mask_root: D:\BaiduNetdiskDownload\GED4_masks_pred
mask_suffix: GED4_pred.nii.gz
input_nc: 3
output_nc: 1
patch_size: [16, 128, 128]
patch_stride: [8, 64, 64]
target_size: null
normalize_to_tanh: true
resample_to_target: true
percentile_lower: 1.0
percentile_upper: 99.0
max_patches_per_volume: null

train_txt_path: data/train.txt
val_txt_path: data/val.txt
test_txt_path: data/test.txt

# Generator (MrGAN-style: Encoder -> ShareNet -> Decoder + CBAM)
g_base_channels: 32
g_layers: 2
g_share_layers: 3

# Discriminator (one per input modality)
d_base_channels: 32
d_layers: 3

# Registration sub-network
regist: true

# Shape loss via pretrained UNet3D
shape_loss: true
unet_chk: chk/UNet3D.pth
unet_depth: 1
unet_base_channels: 32
num_classes: 2
palette: [[0], [1]]

# Loss weights (mirror reference/MrGAN/Yaml/mrgan.yaml)
adv_lambda: 1.0
# Direct L1 on G(A) before Reg warps it. The Phase-1 diagnostic on the previous
# epoch=74 ckpt found L1(fake_b, B)=0.74 vs L1(reg_b, B)=0.007: Reg was acting as
# a shortcut so G learned a single mean-image. direct_lambda forces G itself to
# match the target, p2p_lambda is reduced from 5.0 → 2.0 so Reg cannot dominate.
direct_lambda: 5.0
p2p_lambda: 2.0
# Penalise Reg's raw flow magnitude. Smoothness alone allows uniform 8-voxel
# shifts (observed in epoch=74 ckpt); this term makes Reg pay for any motion.
mag_lambda: 2.0
# Freeze Reg as identity for the first N epochs so G learns input→output
# alignment by itself before Reg can compensate.
reg_warmup_epochs: 10
blur_lambda: 5.0
perceptual_lambda: 0.5
corr_lambda: 1.0
smooth_lambda: 1.0
shape_lambda: 1.0

# Training
cuda: true
epoch: 0
n_epochs: 80
batch_size: 1
n_cpu: 0
lr: 0.0001
decay_epoch: 20
log_interval: 10
checkpoint_interval: 5
