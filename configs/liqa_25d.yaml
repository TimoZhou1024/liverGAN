name: liqa_mrgan25d
save_root: outputs/liqa_25d

# Data
input_modalities: [T1, T2, DWI_800]
target_modality: GED4
slice_window: 3
input_nc: 9
output_nc: 1
target_size: 256
normalize_to_tanh: true
resample_to_target: true
percentile_lower: 1.0
percentile_upper: 99.0
use_non_empty_target: false
min_target_fraction: 0.0

train_txt_path: data/train.txt
val_txt_path: data/val.txt
test_txt_path: data/test.txt

# Model
g_base_channels: 64
d_base_channels: 64
d_layers: 3
condition_channels_for_d: 9

# Training
cuda: true
epoch: 0
n_epochs: 80
batch_size: 1
n_cpu: 0
lr: 0.0001
adv_lambda: 1.0
l1_lambda: 10.0
blur_lambda: 2.0
log_interval: 20
checkpoint_interval: 5
