name: liqa_mrgan3d_full
save_root: outputs/liqa_mrgan3d_full
mode: 3d_full

# Data — whole-volume training. Each case is resampled to volume_size before
# being fed to the network. All three dimensions MUST be divisible by 32
# (MrGANGenerator3D halves each spatial dim 5 times: 2× in Encoder + 3× in
# ShareNet). [32, 384, 384] is a good fit for LiQA's native axial resolution.
input_modalities: [T1, T2, DWI_800]
target_modality: GED4
dataset_root: D:\BaiduNetdiskDownload
mask_root: D:\BaiduNetdiskDownload\GED4_masks_pred
mask_suffix: GED4_pred.nii.gz
input_nc: 3
output_nc: 1
volume_size: [32, 384, 384]
normalize_to_tanh: true
resample_to_target: true
percentile_lower: 1.0
percentile_upper: 99.0

train_txt_path: data/train.txt
val_txt_path: data/val.txt
test_txt_path: data/test.txt

# Model
g_base_channels: 32
g_layers: 2
g_share_layers: 3
d_base_channels: 32
d_layers: 3
regist: true
shape_loss: true
unet_chk: chk/UNet3D.pth
unet_depth: 1
unet_base_channels: 32
num_classes: 2
palette: [[0], [1]]

# Loss weights (mirror reference/MrGAN/Yaml/mrgan.yaml)
adv_lambda: 1.0
p2p_lambda: 5.0
blur_lambda: 5.0
perceptual_lambda: 0.5
corr_lambda: 1.0
smooth_lambda: 1.0
shape_lambda: 1.0
liver_weight: 20.0
bg_weight: 1.0

# LPIPS: subsample k slices per forward to cap VGG activation memory. At D=32
# the unsubsampled path effectively runs batch=32 through VGG16 (10+ GB of
# activations per call). k=4 drops that to batch=4 for ~8× memory savings with
# only mild variance increase in the per-step perceptual estimate.
lpips_slices: 4

# Training
cuda: true
epoch: 0
n_epochs: 80
batch_size: 1               # per-rank; global batch = 1 * world_size
n_cpu: 2
lr: 0.0001
decay_epoch: 20
log_interval: 10
checkpoint_interval: 5

# Distributed / AMP — active under torchrun, ignored in single-GPU mode.
amp: true
activation_checkpoint: true
